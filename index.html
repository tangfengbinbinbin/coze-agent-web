  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: linear-gradient(180deg, #030712 0%, #07111f 50%, #020617 100%);
      min-height: 100vh;
      color: #e5edff;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(10, 24, 46, 0.92);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid rgba(120, 170, 255, 0.22);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .tag {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(80, 140, 255, 0.16);
      color: #9fc7ff;
      font-size: 13px;
      font-weight: bold;
    }

    h1 {
      margin-bottom: 16px;
      font-size: 42px;
      line-height: 1.2;
      color: #ffffff;
    }

    p {
      line-height: 1.9;
      color: rgba(230, 240, 255, 0.76);
      font-size: 16px;
    }

    .features {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .feature {
      padding: 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(130, 180, 255, 0.16);
    }

    .feature strong {
      display: block;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .feature span {
      font-size: 13px;
      color: rgba(220,235,255,0.62);
      line-height: 1.7;
    }

    @media (max-width: 800px) {
      body {
        padding: 20px;
      }

      h1 {
        font-size: 32px;
      }

      .features {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
